name: tailorx
description: TailorX - Premium Boutique Management App
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.1.0
  intl: ^0.20.2
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  shared_preferences: ^2.2.2
  pdf: ^3.10.7
  printing: ^5.11.1
  supabase_flutter: ^2.3.4
  image_picker: ^1.1.2
  local_auth: ^2.3.0
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
